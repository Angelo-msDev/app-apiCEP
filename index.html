<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de CEP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Busca de Endereço</h2>
        
        <div class="form-content">
            <label for="cep">Digite o CEP</label>
            <input type="text" id="cep" placeholder="Ex: 01001-000" maxlength="9">
            
            <div class="result-fields">
                <label for="logradouro">Rua</label>
                <input type="text" id="logradouro" readonly>

                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" readonly>

                <label for="localidade">Cidade/UF</label>
                <input type="text" id="localidade" readonly>
            </div>

            <div id="mensagem" style="display: none;">CEP não encontrado ou inválido.</div>
            
            <button id="btnBuscar" class="btn-full">Buscar Endereço</button> 
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
