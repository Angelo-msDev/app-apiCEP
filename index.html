<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de CEP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Busca de Endereço</h2>
    
    <label for="cep">Digite o CEP</label>
    <div class="search-box">
        <input type="text" id="cep" placeholder="Ex: 01001-000" maxlength="9">
        <button id="btnBuscar">Buscar</button>
    </div>
    
    <div id="mensagem">CEP não encontrado ou inválido.</div>

    <div class="form-group">
        <label>Rua</label>
        <input type="text" id="logradouro" class="readonly" readonly>
    </div>

    <div class="form-group">
        <label>Bairro</label>
        <input type="text" id="bairro" class="readonly" readonly>
    </div>

    <div class="form-group">
        <label>Cidade/UF</label>
        <input type="text" id="localidade" class="readonly" readonly>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
