<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta de CEP - Projeto ADS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="kicker">Projeto simples</p>
      <h1>Consulta de CEP</h1>
      <p class="subtitle">Trabalho de ADS para consultar endereco pelo ViaCEP.</p>
    </header>

    <section class="card">
      <h2>Consultar por CEP</h2>
      <form id="cep-form" class="form-grid" novalidate>
        <label for="cep">CEP (8 dígitos)</label>
        <div class="input-row">
          <input id="cep" name="cep" type="text" inputmode="numeric" maxlength="8" placeholder="Ex: 01001000" required />
          <button type="submit">Buscar</button>
        </div>
        <small class="hint">Digite so numeros, com 8 digitos.</small>
      </form>
      <div id="cep-status" class="status" role="status" aria-live="polite"></div>
      <div id="cep-result" class="result"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
